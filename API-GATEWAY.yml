server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/product-service/**
          filters:
            - StripPrefix=1   # 🔥 IMPORTANT

  webflux:
    base-path: /

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
